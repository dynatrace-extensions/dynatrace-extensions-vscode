name: custom:mock.full.extension
version: 1.0.0
minDynatraceVersion: 1.280.0
minEECVersion: 1.275.0
author:
  name: Mock Testing

metrics:
  - key: mock.e1.metric.six
    metadata:
      displayName: Mock metric six
      description: Mock metric six
      sourceEntityType: mock:entity-1
  - key: mock.some.metric

topology:
  types:
    - name: mock:entity-1
      displayName: Mock Entity 1
      enabled: true
      rules:
        - idPattern: mock_e1_{mock_attr_1_1}
          instanceNamePattern: "{mock_attr_1_1}"
          sources:
            - sourceType: Metrics
              condition: $prefix(mock.e1.metric.)
          attributes:
            - pattern: "{mock_attr_1_1}"
              key: mock_attr_1_1
          role: default
        - idPattern: mock_e1_{mock_attr_1_1}
          instanceNamePattern: "{mock_attr_1_1}"
          sources:
            - sourceType: Metrics
              condition: $eq(mock.e1.metric.a.three)
          requiredDimensions:
            - key: mock_attr_1_2
          attributes:
            - pattern: "{mock_attr_1_2}"
              key: mock_attr_1_2
              displayName: MockAttribute_1_2
          role: default
  relationships:
    - fromType: mock:entity-1
      typeOfRelation: RUNS_ON
      toType: mock:entity-2
    - fromType: mock:entity-1
      typeOfRelation: CHILD_OF
      toType: mock:entity-3
    - fromType: mock:entity-1
      typeOfRelation: PART_OF
      toType: mock:entity-4
    - fromType: mock:entity-4
      typeOfRelation: SAME_AS
      toType: mock:entity-1
    - fromType: mock:entity-3
      typeOfRelation: INSTANCE_OF
      toType: mock:entity-1
    - fromType: mock:entity-2
      typeOfRelation: CALLS
      toType: mock:entity-1

snmp:
  - group: metrics
    dimensions:
      - key: mock.dimension.zero
        value: oid:0.0.0.0.0
    subgroups:
      - subgroup: metrics1
        featureSet: fs1
        dimensions:
          - key: mock.dimension.one
            value: oid:1.1.1.1.0
        metrics:
          - key: mock.e1.metric.one
            value: oid:1.1.1.1.1
          - key: mock.e1.metric.seven
            value: oid:7.7.7.7.7
            featureSet: fs4
  - group: metrics2
    featureSet: fs2
    dimensions:
      - key: mock.dimension.two
        value: oid:1.1.1.0.0
    metrics:
      - key: mock.e1.metric.two
        value: oid:2.2.2.2.2.2
      - key: mock.e1.metric.three
        value: oid:3.3.3.3.3.3
      - key: mock.e1.metric.four
        value: oid:4.4.4.4.4.4
      - key: mock.e1.metric.five
        value: oid:5.5.5.5.5.5
        type: count
        featureSet: fs3
      - key: mock.e1.metric.a.three
        value: oid:3.3.3.3.33
        featureSet: fs3
  - group: metrics3
    metrics:
      - key: mock.e1.metric.six
        value: oid:6.6.6.6.6
  - group: metrics4
    featureSet: fs5
    subgroups:
      - subgroup: ""
        metrics:
          - key: mock.e1.metric.eight
            value: oid:8.8.8.8.8
  - group: metrics5
    subgroups:
      - subgroup: ""
        metrics:
          - key: mock.e1.metric.nine
            value: oid:9.9.9.9.9
          - key: mock.e1.metric.ten
            featureSet: fs1
            value: oid:10.10.10

screens:
  - entityType: mock:entity-1
    detailsInjections:
      - key: card-5
        type: EVENTS
    listInjections:
      - key: card-6
        type: MESSAGE
    listSettings:
      layout:
        autoGenerate: false
        cards:
          - key: card-1
            type: CHART_GROUP
          - key: card-2
            type: ENTITIES_LIST
          - type: INJECTIONS
    detailsSettings:
      layout:
        autoGenerate: false
        cards:
          - key: card-3
            type: METRIC_TABLE
          - key: card-4
            type: LOGS
          - type: INJECTIONS
    chartsCards:
      - key: charts-card-1
        displayName: Charts Card 1
        numberOfVisibleCharts: 2
        mode: NORMAL
        charts:
          - displayName: Single Value Chart
            visualizationType: SINGLE_VALUE
            singleValueConfig:
              foldTransformation: LAST_VALUE
              showSparkline: false
              showTrend: false
              metric:
                metricSelector: mock.e1.metric.three:splitBy("dt.entity.mock:entity-1")
          - displayName: Graph Chart
            visualizationType: GRAPH_CHART
            graphChartConfig:
              stacked: true
              metrics:
                - metricSelector: mock.e1.metric.four:splitBy("dt.entity.mock:entity-1")
                  visualization:
                    seriesType: AREA
                - metricSelector: mock.e1.metric.five:splitBy("dt.entity.mock:entity-1")
                  visualization:
                    seriesType: AREA
          - displayName: Pie Chart
            visualizationType: PIE_CHART
            pieChartConfig:
              metric:
                metricSelector: mock.e1.metric.two:splitBy()
    entitiesListCards:
      - key: entity-list-card-1
        pageSize: 20
        displayName: Entity List Card 1
        displayCharts: false
        enableDetailsExpandability: true
        numberOfVisibleCharts: 2
        displayIcons: true
        charts:
          - displayName: Single Value Chart
            visualizationType: SINGLE_VALUE
            singleValueConfig:
              foldTransformation: LAST_VALUE
              showSparkline: false
              showTrend: false
              metric:
                metricSelector: mock.e1.metric.one:splitBy("dt.entity.mock:entity-1")
          - displayName: Graph Chart
            visualizationType: GRAPH_CHART
            graphChartConfig:
              stacked: true
              metrics:
                - metricSelector: mock.e1.metric.two:splitBy("dt.entity.mock:entity-1")
                  visualization:
                    seriesType: AREA
                - metricSelector: mock.e1.metric.a.three:splitBy("dt.entity.mock:entity-1")
                  visualization:
                    seriesType: AREA
          - displayName: Pie Chart
            visualizationType: PIE_CHART
            pieChartConfig:
              metric:
                metricSelector: mock.e1.metric.six:splitBy()
    metricTableCards:
      - key: metric-table-card-1
    logsCards:
      - key: log-card-1
    messageCards:
      - key: message-card-1
    eventsCards:
      - key: events-card-1
